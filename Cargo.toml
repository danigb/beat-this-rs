[package]
name = "beat-this"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "beat-this"
path = "src/main.rs"

[lib]
name = "beat_this"
path = "src/lib.rs"

[dependencies]
ort = { version = "=2.0.0-rc.10", features = ["ndarray", "load-dynamic", "coreml"] }
ndarray = "0.16"
anyhow = "1"
symphonia = { version = "0.5", features = ["all"] }
rubato = "0.14"
hound = "3.5"
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
tempfile = "3"
